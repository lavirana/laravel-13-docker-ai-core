# docker/nginx/default.conf

server {
    # Listen on port 80
    listen 80;

    # Document root — points to Laravel's public folder
    root /var/www/public;

    # Default index file
    index index.php index.html index.htm;

    # Your domain (localhost for local dev)
    server_name localhost;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Handle all requests
    location / {
        # Try to serve file directly, then folder,
        # then fall back to index.php (required for Laravel routing)
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP files to PHP-FPM container
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 'php' is the service name from docker-compose.yml
        fastcgi_pass php:9000;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
# docker-compose.yml

version: '3.8'

services:

  # -----------------------------------------------
  # PHP Service — runs your Laravel application
  # -----------------------------------------------
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: laravel_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Mount your local src/ folder into the container
      # Any changes you make locally appear instantly in the container
      - ./src:/var/www
    networks:
      - laravel_network
    depends_on:
      - mysql
      - redis

  # -----------------------------------------------
  # Nginx Service — web server, handles HTTP requests
  # -----------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      # Map port 8000 on your machine to port 80 in container
      # Access your app at http://localhost:8000
      - "8000:80"
    volumes:
      # Mount your Laravel app
      - ./src:/var/www
      # Mount your Nginx config
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - php

  # -----------------------------------------------
  # MySQL Service — database
  # -----------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      # Access MySQL from your machine at port 3307
      # (Using 3307 to avoid conflict with any local MySQL on 3306)
      - "3307:3306"
    volumes:
      # Persist database data — so data survives container restarts
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_network

  # -----------------------------------------------
  # phpMyAdmin — visual database manager
  # -----------------------------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: laravel_user
      PMA_PASSWORD: laravel_password
    ports:
      # Access phpMyAdmin at http://localhost:8080
      - "8080:80"
    networks:
      - laravel_network
    depends_on:
      - mysql

  # -----------------------------------------------
  # Redis — for caching and queues
  # -----------------------------------------------
  redis:
    image: redis:alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_network

# -----------------------------------------------
# Named Volumes — persistent data storage
# -----------------------------------------------
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# -----------------------------------------------
# Network — all containers talk to each other here
# -----------------------------------------------
networks:
  laravel_network:
    driver: bridge